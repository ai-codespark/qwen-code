name: ai-codespark-release

on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # for npm provenance

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      NPM_PACKAGE_NAME: "@ai-codespark/qwen-code"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Extract package version
        id: pkg
        run: |
          echo "PACKAGE_VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_ENV
          echo "Detected version: $(node -p "require('./package.json').version")"

      - name: Validate tag matches package version
        if: startsWith(github.ref_name, 'v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)." >&2
            exit 1
          fi

      - name: Check if version already published
        id: check
        run: |
          if npm view "$NPM_PACKAGE_NAME@$PACKAGE_VERSION" version > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Version $PACKAGE_VERSION already exists on npm. Skipping publish."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Version $PACKAGE_VERSION not found on npm. Will publish."
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.AI_CODESPARK_NPM_TOKEN }}

      - name: Publish to npm
        if: steps.check.outputs.exists == 'false'
        run: |
          npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.AI_CODESPARK_NPM_TOKEN }}
